desktop_guide_0=🎉 Willkommen bei CrossPaste!\n🔗 Um mit dem Kopieren und Einfügen zwischen Geräten zu beginnen, verbinden Sie bitte zuerst Ihre Geräte.\nTippen Sie oben auf die Registerkarte "Geräte", um ein nahegelegenes Gerät hinzuzufügen. Nach der Verifizierung über Token können Sie nahtlos einfügen.
desktop_guide_1=✨ Wir unterstützen Text, Links, Farben, HTML, RTF, Bilder, Dateien (einschließlich Ordner). Jede Zwischenablage kann eine Mischung dieser Typen enthalten, aber nur der Haupttyp wird angezeigt.
desktop_guide_2=🔎 Alles was Sie kopieren wird automatisch hier gespeichert. Sie müssen sich keine Sorgen um die Bereinigung machen—das geschieht rechtzeitig.\n⭐ Möchten Sie etwas Wichtiges behalten? Tippen Sie einfach auf das Stern-Symbol rechts, um zu verhindern, dass es gelöscht wird.
desktop_guide_3=🔐 Ihre Sicherheit ist unser Versprechen.\nCrossPaste ist serverlos. Alle Synchronisation erfolgt in Ihrem lokalen Netzwerk.\nWir unterstützen auch Ende-zu-Ende-Verschlüsselung, sodass Ihre Daten auch in nicht vertrauenswürdigen Netzwerken sicher bleiben.
desktop_guide_4=💡 CrossPaste ist vollständig Open-Source! Schauen Sie gerne unseren Code an, melden Sie Probleme oder tragen Sie bei!
