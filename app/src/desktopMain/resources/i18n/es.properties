desktop_guide_0=🎉 ¡Bienvenido a CrossPaste!\n🔗 Para comenzar a copiar y pegar entre dispositivos, primero debes conectarlos.\nAbre la pestaña “Dispositivos” arriba, agrega un dispositivo cercano y verifica con un Token. Luego podrás pegar sin interrupciones.
desktop_guide_1=✨ Soportamos texto, enlaces, colores, HTML, RTF, imágenes, archivos (incluyendo carpetas). Cada portapapeles puede contener una combinación de estos tipos, pero solo se muestra el tipo principal.
desktop_guide_2=🔎 Todo lo que copias se guarda automáticamente aquí. No necesitas preocuparte por la limpieza, se hará automáticamente con el tiempo.\n⭐ ¿Quieres conservar algo importante? Solo toca la estrella a la derecha para evitar que se elimine.
desktop_guide_3=🔐 La seguridad es nuestra promesa.\nCrossPaste no utiliza servidores: toda la sincronización ocurre dentro de tu red local.\nTambién soportamos cifrado de extremo a extremo, así que tus datos están protegidos incluso en redes no confiables.
desktop_guide_4=💡 ¡CrossPaste es completamente de código abierto! Puedes revisar el código, reportar problemas o contribuir.
