desktop_guide_0=🎉 Bem-vindo ao CrossPaste!\n🔗 Para começar a copiar e colar entre dispositivos, primeiro conecte seus dispositivos.\nAbra a aba "Dispositivos" acima, adicione um dispositivo próximo e verifique com um Token. Depois, você poderá colar sem interrupções.
desktop_guide_1=✨ Suportamos texto, links, cores, HTML, RTF, imagens, arquivos (incluindo pastas). Cada área de transferência pode conter uma combinação desses tipos, mas apenas o tipo principal é exibido.
desktop_guide_2=🔎 Tudo o que você copia é salvo automaticamente aqui. Não precisa se preocupar com limpeza — ela acontecerá automaticamente com o tempo.\n⭐ Quer manter algo importante? Basta tocar no ícone de estrela à direita para evitar que seja removido.
desktop_guide_3=🔐 A segurança é a nossa promessa.\nO CrossPaste não usa servidores. Toda a sincronização acontece dentro da sua rede local.\nTambém suportamos criptografia de ponta a ponta, para que seus dados fiquem seguros mesmo em redes não confiáveis.
desktop_guide_4=💡 O CrossPaste é totalmente de código aberto! Sinta-se à vontade para verificar nosso código, relatar problemas ou contribuir!
