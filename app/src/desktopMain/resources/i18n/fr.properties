desktop_guide_0=🎉 Bienvenue dans CrossPaste !\n🔗 Pour commencer à copier et coller entre appareils, veuillez d'abord connecter vos appareils.\nTouchez l'onglet "Appareils" ci-dessus pour ajouter un appareil à proximité. Une fois vérifié via Token, vous êtes prêt à coller sans interruption.
desktop_guide_1=✨ Nous prenons en charge le texte, les liens, les couleurs, HTML, RTF, les images, les fichiers (y compris les dossiers). Chaque presse-papiers peut contenir un mélange de ces types, mais seul le type principal est affiché.
desktop_guide_2=🔎 Tout ce que vous copiez est automatiquement sauvegardé ici. Vous n'avez pas à vous soucier du nettoyage—cela se fera en temps voulu.\n⭐ Vous voulez garder quelque chose d'important ? Touchez simplement l'icône étoile à droite pour éviter qu'elle soit effacée.
desktop_guide_3=🔐 Votre sécurité est notre promesse.\nCrossPaste est sans serveur. Toute synchronisation se fait dans votre réseau local.\nNous prenons également en charge le chiffrement de bout en bout, donc même sur des réseaux non fiables, vos données restent sécurisées.
desktop_guide_4=💡 CrossPaste est entièrement open-source ! N'hésitez pas à consulter notre code, signaler des problèmes ou contribuer !
